<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>OP Flow Insight runtime regression</title>
	<style>
		:root {
			--primary: #5e72e4;
			--background: #f4f5f7;
			--surface: #fff;
			--surface-alt: #f4f6f9;
			--text: #32325d;
			--muted: #8898aa;
			--line: #dee2e6;
			font-family: Arial, sans-serif;
			color: var(--text);
		}
		* { box-sizing: border-box; }
		body { margin: 0; background: var(--background); color: var(--text); }
		.test-topbar {
			align-items: flex-start;
			background: var(--primary);
			display: flex;
			height: 90px;
			justify-content: flex-end;
			left: 240px;
			padding: 1rem;
			position: absolute;
			right: 0;
			top: 0;
		}
		.test-shell { min-height: 100vh; padding-left: 240px; }
		.test-sidebar {
			background: var(--surface);
			border-right: 1px solid var(--line);
			bottom: 0;
			left: 0;
			padding: 2rem 1rem;
			position: fixed;
			top: 0;
			width: 240px;
		}
		.test-main { padding: 58px 1.25rem 1.25rem; width: 100%; }
		h2 {
			background: var(--surface);
			border-radius: .25rem;
			box-shadow: 0 4px 8px rgba(0, 0, 0, .03);
			color: var(--text);
			font-size: 1.25rem;
			margin: 0;
			padding: 1rem 1.25rem;
		}
		h3 {
			background: var(--surface);
			border-radius: .25rem;
			color: var(--text);
			font-size: 1.1rem;
			margin: 0;
			padding: .875rem 1.25rem;
		}
		.cbi-section {
			background: var(--surface);
			border-radius: .25rem;
			box-shadow: 0 4px 8px rgba(0, 0, 0, .03);
		}
		.cbi-tabmenu {
			display: flex;
			gap: .35rem;
			margin: 0 1.25rem;
			padding: 0;
		}
		.cbi-tabmenu li {
			background: var(--surface-alt);
			border-radius: .25rem .25rem 0 0;
			list-style: none;
		}
		.cbi-tabmenu li a {
			color: var(--text);
			display: block;
			padding: .65rem .9rem;
			text-decoration: none;
		}
		.cbi-tabmenu li.cbi-tab {
			background: var(--surface);
			box-shadow: inset 0 -3px 0 var(--primary);
		}
		.table { display: table; width: 100%; }
		.tr { display: table-row; }
		.th, .td {
			border-bottom: 1px solid var(--line);
			display: table-cell;
			padding: .75rem;
			text-align: center;
		}
		.th { background: var(--surface-alt); }
		.alert-message {
			background: var(--surface-alt);
			border-left: 3px solid var(--muted);
			color: var(--text);
			padding: .8rem 1rem;
		}
		/* Deliberately imitate a few conflicting rules found across LuCI themes. */
		section { float: left; width: 48%; }
		svg, path { display: none; opacity: 0; stroke: transparent; }
		.table { display: flex !important; flex-direction: column; }
		.cbi-map { margin-left: -2rem; position: absolute; width: 140%; }
		body.test-dark {
			--background: #1e1e1e;
			--surface: #2b3037;
			--surface-alt: #333941;
			--text: #e3e7ed;
			--muted: #aeb7c2;
			--line: #454c55;
		}
		@media (max-width: 768px) {
			.test-shell { padding-left: 0; }
			.test-sidebar { display: none; }
			.test-topbar { left: 0; }
			.test-main { padding: 58px .75rem .75rem; }
		}
	</style>
	<link rel="stylesheet" href="../openwrt/rootfs/www/luci-static/resources/op-flow.css">
</head>
<body>
	<header class="test-topbar"><button>刷新</button></header>
	<div class="test-shell">
		<aside class="test-sidebar">ImmortalWrt<br><br>状态<br>流量洞察</aside>
		<main class="test-main"><div id="mount"></div></main>
	</div>
	<script>
		var query = new URLSearchParams(location.search);
		if (query.get('dark') === '1') document.body.classList.add('test-dark');

		var dashboardData = {
			totals: {
				download_bps: 7885291, upload_bps: 2726297,
				downloaded: 2555505541, uploaded: 301721305088,
				active_hosts: 8, active_flows: 500, highest_risk: 0,
				period: '2026-07', next_reset_at: '2026-07-31T15:00:00Z'
			},
			history: [
				{ at: '2026-07-18T10:00:00Z', upload_bps: 1000000, download_bps: 3800000 },
				{ at: '2026-07-18T10:00:05Z', upload_bps: 1250000, download_bps: 5200000 },
				{ at: '2026-07-18T10:00:10Z', upload_bps: 1100000, download_bps: 4400000 },
				{ at: '2026-07-18T10:00:15Z', upload_bps: 1800000, download_bps: 7600000 },
				{ at: '2026-07-18T10:00:20Z', upload_bps: 1500000, download_bps: 6100000 },
				{ at: '2026-07-18T10:00:25Z', upload_bps: 2726297, download_bps: 7885291 }
			],
			hosts: [
				{ id: 'mac:00:0E:1E:62:BD:C2', hostname: 'ASROCK-B550M-PRO4', ip: '10.64.0.68', mac: '00:0E:1E:62:BD:C2', addresses: [ { ip: '10.64.0.68', family: 'ipv4', scope: 'lan' }, { ip: 'fd00::68', family: 'ipv6', scope: 'lan' }, { ip: '2001:db8:64::68', family: 'ipv6', scope: 'global' } ], download_bps: 7832862, upload_bps: 1342177, downloaded: 1026555904, uploaded: 335544320, active_flows: 32, max_risk: 0 },
				{ id: 'mac:BC:24:11:9A:93:C7', hostname: 'konomitv', ip: '10.64.0.64', mac: 'BC:24:11:9A:93:C7', addresses: [ { ip: '10.64.0.64', family: 'ipv4', scope: 'lan' }, { ip: 'fe80::1', family: 'ipv6', scope: 'link-local' } ], download_bps: 5632, upload_bps: 1300234, downloaded: 24431821, uploaded: 5025111736, active_flows: 4, max_risk: 0 },
				{ id: 'mac:00:11:22:33:44:55', hostname: 'gateway-test', ip: '10.64.0.5', mac: '00:11:22:33:44:55', addresses: [ { ip: '10.64.0.5', family: 'ipv4', scope: 'lan' }, { ip: '2001:db8:64::5', family: 'ipv6', scope: 'global' } ], download_bps: 1, upload_bps: 2, downloaded: 3, uploaded: 4, active_flows: 2, max_risk: 0 }
			],
			flows: [
				{ host_id: 'mac:00:0E:1E:62:BD:C2', host_ip: '10.64.0.68', ip_version: 'ipv4', direction: 'outbound', protocol: 'tcp', source: { ip: '10.64.0.68', port: 53000 }, destination: { ip: '1.1.1.1', port: 443 }, geo: { country_code: 'AU', asn: 13335, asn_org: 'Cloudflare' }, download_bps: 1048576, upload_bps: 524288, risk: { score: 0, evidence: [] } },
				{ host_id: 'mac:00:11:22:33:44:55', host_ip: '10.64.0.5', ip_version: 'ipv4', direction: 'outbound', protocol: 'udp', source: { ip: '10.64.0.5', port: 53001 }, destination: { ip: '8.8.8.8', port: 53 }, geo: { country_code: 'US', asn: 15169, asn_org: 'Google' }, download_bps: 1024, upload_bps: 2048, risk: { score: 0, evidence: [] } },
				{ host_id: 'mac:00:11:22:33:44:55', host_ip: '2001:db8:64::5', ip_version: 'ipv6', direction: 'outbound', protocol: 'tcp', source: { ip: '2001:db8:64::5', port: 53002 }, destination: { ip: '2606:4700:4700::1111', port: 443 }, geo: { country_code: 'US', asn: 13335, asn_org: 'Cloudflare' }, download_bps: 4096, upload_bps: 1024, risk: { score: 0, evidence: [] } }
			],
			usage_periods: {
				day: [ '2026-07-20', '2026-07-19' ],
				month: [ '2026-07', '2026-06' ],
				quarter: [ '2026-Q3', '2026-Q2' ],
				year: [ '2026' ]
			},
			data: { loaded: true, updated_at: '2026-07-18T10:00:00Z', update_running: false },
			health: {
				warnings: [],
				lan_prefixes: [ '10.64.0.0/16', 'fd00::/8', '2001:db8:64::/64' ],
				router_lan_addresses: [
					{ ip: '10.64.0.1', family: 'ipv4', scope: 'lan' },
					{ ip: 'fd00::1', family: 'ipv6', scope: 'lan' }
				]
			}
		};
		var usageHistoryData = {
			granularity: 'month',
			period: '2026-07',
			options: [ '2026-07', '2026-06' ],
			totals: { downloaded: 2555505541, uploaded: 301721305088 },
			records: [
				{ host_id: 'mac:00:11:22:33:44:55', hostname: 'gateway-test', mac: '00:11:22:33:44:55', addresses: [ { ip: '10.64.0.5', family: 'ipv4', scope: 'lan' }, { ip: '2001:db8:64::5', family: 'ipv6', scope: 'global' } ], downloaded: 3, uploaded: 4 }
			]
		};

		function append(parent, value) {
			if (value === null || value === undefined || value === false) return;
			if (Array.isArray(value)) {
				value.forEach(function(item) { append(parent, item); });
			} else if (value instanceof Node) {
				parent.appendChild(value);
			} else {
				parent.appendChild(document.createTextNode(String(value)));
			}
		}

		function E(name, attributes, children) {
			if (!(attributes instanceof Object) || Array.isArray(attributes) || attributes instanceof Node) {
				children = attributes;
				attributes = {};
			}
			var node = document.createElement(name);
			Object.keys(attributes || {}).forEach(function(key) {
				var value = attributes[key];
				if (value === null || value === undefined) return;
				if (key === 'click' || key === 'keydown') node.addEventListener(key, value);
				else node.setAttribute(key, String(value));
			});
			append(node, children);
			return node;
		}

		var dom = {
			content: function(node, value) {
				while (node.firstChild) node.removeChild(node.firstChild);
				append(node, value);
			}
		};
		var rpc = {
			declare: function(specification) {
				return function() {
					if (specification.method === 'history')
						return Promise.resolve(usageHistoryData);
					if (specification.method === 'export')
						return Promise.resolve({ filename: 'op-flow-month-2026-07.txt', content: 'test' });
					return Promise.resolve(dashboardData);
				};
			}
		};
		var ui = {
			createHandlerFn: function(context, handler) {
				return function(event) { return handler.call(context, event); };
			},
			addNotification: function() {},
			tabs: {
				initTabGroup: function(panes) {
					panes = Array.from(panes || []);
					if (!panes.length) return;
					var group = panes[0].parentNode;
					var menu = E('ul', { 'class': 'cbi-tabmenu' });
					var activate = function(index) {
						panes.forEach(function(pane, paneIndex) {
							var active = paneIndex === index;
							pane.setAttribute('data-tab-active', active ? 'true' : 'false');
							pane.style.display = active ? '' : 'none';
							var item = menu.childNodes[paneIndex];
							item.className = active ? 'cbi-tab' : 'cbi-tab-disabled';
						});
						panes[index].dispatchEvent(new CustomEvent('cbi-tab-active', {
							detail: { tab: panes[index].getAttribute('data-tab') }
						}));
					};
					panes.forEach(function(pane, index) {
						var link = E('a', {
							'href': '#',
							'click': function(event) {
								event.preventDefault();
								activate(index);
							}
						}, pane.getAttribute('data-tab-title'));
						menu.appendChild(E('li', {
							'class': pane.getAttribute('data-tab-active') === 'true' ?
								'cbi-tab' : 'cbi-tab-disabled',
							'data-tab': pane.getAttribute('data-tab')
						}, link));
					});
					group.parentNode.insertBefore(menu, group);
					var selected = panes.findIndex(function(pane) {
						return pane.getAttribute('data-tab-active') === 'true';
					});
					activate(selected >= 0 ? selected : 0);
				}
			}
		};
		var view = { extend: function(definition) { return definition; } };
		function _(message) { return message; }
		var L = {
			resource: function(path) {
				return '../openwrt/rootfs/www/luci-static/resources/' + path;
			},
			bind: function(fn, context) { return fn.bind(context); },
			Poll: { add: function() {} }
		};

		function rect(selector) {
			return document.querySelector(selector).getBoundingClientRect();
		}
		function inside(inner, outer, tolerance) {
			tolerance = tolerance || 1;
			return inner.left >= outer.left - tolerance && inner.right <= outer.right + tolerance &&
				inner.top >= outer.top - tolerance && inner.bottom <= outer.bottom + tolerance;
		}
		function rgb(element) {
			return getComputedStyle(element).color.replace(/\s+/g, '');
		}
		function textRect(element) {
			var range = document.createRange();
			range.selectNodeContents(element);
			return range.getBoundingClientRect();
		}

		function layoutReport() {
			if (document.getElementById('layout-report')) return;
			var checks = [];
			function add(name, pass, detail) {
				checks.push({ name: name, pass: Boolean(pass), detail: detail || '' });
			}
			var root = rect('.ofi-root');
			var main = rect('.test-main');
			var topbar = rect('.test-topbar');
			var titleElement = document.querySelector('.ofi-root > h2');
			var title = titleElement.getBoundingClientRect();
			var lead = rect('.ofi-lead');
			var toolbar = rect('.ofi-toolbar');
			var summary = rect('.ofi-summary-section');
			var activePanels = Array.from(document.querySelectorAll('.ofi-panel')).filter(function(item) {
				return getComputedStyle(item).display !== 'none';
			});
			var svg = document.querySelector('.ofi-chart');
			var paths = Array.from(document.querySelectorAll('.ofi-chart path'));
			var tabs = Array.from(document.querySelectorAll('.cbi-tabmenu li'));
			var yLabels = Array.from(document.querySelectorAll('.ofi-y-scale span'));
			var xLabels = Array.from(document.querySelectorAll('.ofi-x-scale span'));
			var expectedDown = document.body.classList.contains('test-dark') ? 'rgb(100,164,255)' : 'rgb(22,119,255)';
			var expectedUp = document.body.classList.contains('test-dark') ? 'rgb(69,211,160)' : 'rgb(0,168,120)';
			var expectedSurface = document.body.classList.contains('test-dark') ?
				'rgb(43,48,55)' : 'rgb(255,255,255)';

			add('root stays in content', inside(root, main, 2));
			add('native title sits in the LuCI header area',
				title.top >= main.top && title.top < topbar.bottom &&
				title.left >= root.left && title.right <= root.right + 2);
			add('native title inherits theme surface',
				getComputedStyle(titleElement).backgroundColor.replace(/\s+/g, '') === expectedSurface);
			add('description and toolbar follow title',
				title.bottom <= lead.top + 1 && lead.bottom <= toolbar.top + 1);
			add('toolbar stays in content', inside(toolbar, root, 2));
			add('summary follows toolbar', toolbar.bottom <= summary.top + 1);
			add('only one native tab panel is visible', activePanels.length === 1);
			add('active panel uses full row',
				activePanels.length === 1 &&
				Math.abs(activePanels[0].getBoundingClientRect().width - root.width) <= 2);
			add('SVG uses correct namespace', svg instanceof SVGSVGElement &&
				paths.length === 3 && paths.every(function(path) { return path instanceof SVGPathElement; }));
			add('SVG paths have geometry', paths.slice(1).every(function(path) { return path.getTotalLength() > 0; }));
			add('download chart line visible', getComputedStyle(paths[1]).stroke !== 'none' &&
				getComputedStyle(paths[1]).visibility === 'visible');
			add('upload chart line visible', getComputedStyle(paths[2]).stroke !== 'none' &&
				getComputedStyle(paths[2]).visibility === 'visible');
			add('chart axes expose time and rate units',
				document.querySelector('.ofi-axis-title-y').textContent === 'Rate' &&
				document.querySelector('.ofi-axis-title-x').textContent === 'Time' &&
				yLabels.length === 3 && yLabels.every(function(item) { return /\/s$/.test(item.textContent); }) &&
				xLabels.length === 3 && xLabels.every(function(item) { return /\d{2}:\d{2}/.test(item.textContent); }));
			add('LuCI native tabs are contained', tabs.length === 4 &&
				tabs.every(function(tab) {
					return inside(tab.getBoundingClientRect(), rect('.cbi-tabmenu'), 2);
				}));
			add('LuCI native component classes are used',
				document.querySelectorAll('.cbi-section').length === 5 &&
				Boolean(document.querySelector('.ofi-table.table .tr .th')) &&
				Boolean(document.querySelector('.ofi-table.table .tr .td')));
			add('download summary stays blue',
				rgb(document.querySelector('.ofi-summary-table td.ofi-down')).toLowerCase() === expectedDown);
			add('upload summary stays green',
				rgb(document.querySelector('.ofi-summary-table td.ofi-up')).toLowerCase() === expectedUp);

			tabs[1].querySelector('a').click();
			var hostRows = Array.from(document.querySelectorAll('.ofi-host-row'));
			var hostIPs = hostRows.map(function(row) { return row.dataset.ip; });
			add('hosts use stable numeric IP order',
				hostIPs.join(',') === '10.64.0.5,10.64.0.64,10.64.0.68', hostIPs.join(','));
			add('download host text stays blue',
				rgb(document.querySelector('.ofi-host-table td.ofi-down')).toLowerCase() === expectedDown);
			add('upload host text stays green',
				rgb(document.querySelector('.ofi-host-table td.ofi-up')).toLowerCase() === expectedUp);
			var hostHeaders = Array.from(document.querySelectorAll('.ofi-host-table thead th'));
			var hostCells = Array.from(document.querySelectorAll('.ofi-host-table tbody tr:first-child td'));
			var hostAlignment = hostHeaders.slice(1).map(function(header, index) {
				var cell = hostCells[index + 1];
				var headerRect = textRect(header);
				var cellRect = textRect(cell);
				return {
					header: Math.round((headerRect.left + headerRect.right) * 5) / 10,
					cell: Math.round((cellRect.left + cellRect.right) * 5) / 10,
					pass: getComputedStyle(header).textAlign === 'center' &&
					getComputedStyle(cell).textAlign === 'center' &&
					Math.abs((headerRect.left + headerRect.right) -
						(cellRect.left + cellRect.right)) <= 8
				};
			});
			add('host numeric headers align with data',
				hostAlignment.every(function(item) { return item.pass; }),
				JSON.stringify(hostAlignment));
			add('host rows advertise connection drill-down',
				hostRows.every(function(row) {
					return row.tabIndex === 0 && /current connections/i.test(row.title);
				}));
			add('dual-stack host addresses share one host row',
				Boolean(document.querySelector('.ofi-host-row .ofi-address-ipv4')) &&
				Boolean(document.querySelector('.ofi-host-row .ofi-address-ipv6')) &&
				/Global IPv6/.test(document.querySelector('.ofi-host-row').textContent));
			add('table viewport is contained', Array.from(document.querySelectorAll('.ofi-table-scroll')).every(function(item) {
				return item.getBoundingClientRect().right <= root.right + 2;
			}));

			hostRows[0].click();
			var detailPanel = document.querySelector('[data-ofi-panel="connections"]');
			var detailFlows = Array.from(document.querySelectorAll('.ofi-flow-table tbody tr[data-host]'));
			add('host click opens its connection detail',
				Boolean(detailPanel) && /10\.64\.0\.5/.test(detailPanel.textContent) &&
				detailFlows.length === 1 && detailFlows[0].dataset.host === '10.64.0.5');
			add('connection detail separates IPv4 and IPv6',
				document.querySelectorAll('.ofi-family-tabs .ofi-subtab').length === 2 &&
				/IPv4/.test(document.querySelector('.ofi-family-tabs').textContent) &&
				/IPv6/.test(document.querySelector('.ofi-family-tabs').textContent));
			add('selected host survives live data refresh', (function() {
				var updated = JSON.parse(JSON.stringify(dashboardData));
				updated.hosts.reverse();
				updated.hosts[0].download_bps = 999999999;
				window.testModule.renderData(updated);
				var panel = document.querySelector('[data-ofi-panel="connections"]');
				return Boolean(panel) && /10\.64\.0\.5/.test(panel.textContent) &&
					document.querySelector('.cbi-tabmenu li.cbi-tab').textContent
						.indexOf('Current connections') >= 0;
			})());

			tabs = Array.from(document.querySelectorAll('.cbi-tabmenu li'));
			tabs[1].querySelector('a').click();
			hostRows = Array.from(document.querySelectorAll('.ofi-host-row'));
			add('IP order does not change with traffic',
				hostRows.map(function(row) { return row.dataset.ip; }).join(',') ===
					'10.64.0.5,10.64.0.64,10.64.0.68');
			tabs = Array.from(document.querySelectorAll('.cbi-tabmenu li'));
			tabs[3].querySelector('a').click();
			add('history tab provides period selection and TXT export',
				Boolean(document.querySelector('.ofi-period-picker select')) &&
				Boolean(document.querySelector('.ofi-history-controls .cbi-button-action')));
			tabs = Array.from(document.querySelectorAll('.cbi-tabmenu li'));
			tabs[0].querySelector('a').click();
			add('document has no page overflow', document.documentElement.scrollWidth <= document.documentElement.clientWidth + 2,
				document.documentElement.scrollWidth + '/' + document.documentElement.clientWidth);

			var passed = checks.every(function(check) { return check.pass; });
			document.body.dataset.layout = passed ? 'pass' : 'fail';
			var output = document.createElement('pre');
			output.id = 'layout-report';
			output.hidden = true;
			output.textContent = JSON.stringify({
				passed: passed,
				viewport: [ window.innerWidth, window.innerHeight ],
				rootWidth: Math.round(root.width),
				checks: checks
			});
			document.body.appendChild(output);
		}

		function start() {
			var request = new XMLHttpRequest();
			request.open('GET', '../openwrt/rootfs/www/luci-static/resources/view/status/op_flow.js', false);
			request.send(null);
			if (request.status < 200 || request.status >= 300)
				throw new Error('Failed to load op_flow.js: HTTP ' + request.status);
			var source = request.responseText;
			var factory = new Function('view', 'rpc', 'dom', 'ui', 'L', 'E', source);
			var module = factory(view, rpc, dom, ui, L, E);
			window.testModule = module;
			document.getElementById('mount').appendChild(module.render(dashboardData));
			requestAnimationFrame(layoutReport);
			setTimeout(layoutReport, 100);
		}

		try {
			start();
		} catch (error) {
			var output = document.createElement('pre');
			output.id = 'layout-report';
			output.hidden = true;
			output.textContent = JSON.stringify({ passed: false, error: error.stack || String(error) });
			document.body.appendChild(output);
		}
	</script>
</body>
</html>
